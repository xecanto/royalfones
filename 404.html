<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Royal Fones</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encode the full path as a query-string param and redirect to the root.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 2).join("/") + // keep the /royalfones repo prefix
          "/?p=" +
          encodeURIComponent(l.pathname.slice(l.pathname.indexOf("/", 1)) + l.search) +
          (l.hash ? "&h=" + encodeURIComponent(l.hash) : "")
      );
    </script>
  </head>
  <body></body>
</html>
